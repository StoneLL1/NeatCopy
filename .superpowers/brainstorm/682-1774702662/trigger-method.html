<h2>轮盘的触发方式？</h2>
<p class="subtitle">已选：LLM Prompt 快捷选择器（复用现有 prompts 配置）</p>

<div class="options">
  <div class="option" data-choice="hotkey" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>独立热键</h3>
      <p>新增一个全局热键（如 Ctrl+Shift+P），按下后弹出轮盘</p>
    </div>
  </div>
  <div class="option" data-choice="tray" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>托盘菜单</h3>
      <p>右键托盘图标 → 弹出菜单中选择 Prompt</p>
    </div>
  </div>
  <div class="option" data-choice="both" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>两者都要</h3>
      <p>热键弹出轮盘 + 托盘菜单快捷入口</p>
    </div>
  </div>
</div>
