<h2>已确认：鼠标 + 数字键</h2>
<p class="subtitle">两种选择方式并存，用户按习惯使用</p>

<h2>锁定状态如何显示？</h2>
<p class="subtitle">当用户用"独立切换"模式锁定某个 Prompt 后，如何知道当前锁定的是什么？</p>

<div class="options">
  <div class="option" data-choice="tray-icon" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>托盘图标提示</h3>
      <p>鼠标悬停托盘图标时显示当前锁定的 Prompt 名称</p>
    </div>
  </div>
  <div class="option" data-choice="tray-menu" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>托盘菜单标记</h3>
      <p>右键托盘菜单中，当前锁定的 Prompt 旁显示 ✓ 或高亮</p>
    </div>
  </div>
  <div class="option" data-choice="toast" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>切换时 Toast 提示</h3>
      <p>锁定后弹出 Toast 显示"已锁定：翻译"，不常驻显示</p>
    </div>
  </div>
  <div class="option" data-choice="none" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>不需要显示</h3>
      <p>用户记得自己选了什么，无需额外提示</p>
    </div>
  </div>
</div>
