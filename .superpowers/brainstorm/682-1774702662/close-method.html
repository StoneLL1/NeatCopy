<h2>已确认：托盘菜单标记</h2>
<p class="subtitle">右键托盘菜单中，当前锁定的 Prompt 旁显示 ✓ 或高亮</p>

<h2>轮盘如何关闭？</h2>
<p class="subtitle">用户不想选择时如何退出轮盘</p>

<div class="options">
  <div class="option" data-choice="esc" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>ESC 键关闭</h3>
      <p>按 ESC 键关闭轮盘，不执行任何操作</p>
    </div>
  </div>
  <div class="option" data-choice="click-outside" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>点击外部关闭</h3>
      <p>点击轮盘外的任意位置关闭</p>
    </div>
  </div>
  <div class="option" data-choice="both" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>两者都支持</h3>
      <p>ESC 键 + 点击外部，任一方式均可关闭</p>
    </div>
  </div>
</div>
