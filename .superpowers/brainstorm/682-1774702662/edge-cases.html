<h2>已确认细节</h2>
<p class="subtitle">记住上次 + 最多5个（可配置） + 动画效果</p>

<h2>边缘情况处理</h2>
<p class="subtitle">一些特殊情况如何处理</p>

<div class="options">
  <div class="option" data-choice="skip-single" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>仅1个 Prompt 时跳过轮盘</h3>
      <p>如果用户只配置了1个可见 Prompt，直接执行，不弹出轮盘</p>
    </div>
  </div>
  <div class="option" data-choice="always-show" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>始终弹出轮盘</h3>
      <p>即使只有1个 Prompt，也弹出轮盘让用户确认</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top:2rem">
<h3>没有可见 Prompt 时？</h3>
<p style="color:#aaa;font-size:0.9rem">用户关闭了所有 Prompt 的可见性</p>
<div class="options">
  <div class="option" data-choice="toast-warning" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Toast 提示无可用 Prompt</h3>
      <p>弹出 Toast："无可用的 Prompt，请先在设置中配置"</p>
    </div>
  </div>
  <div class="option" data-choice="silent-fail" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>静默不处理</h3>
      <p>不执行任何操作，剪贴板保持原样</p>
    </div>
  </div>
</div>
</div>
