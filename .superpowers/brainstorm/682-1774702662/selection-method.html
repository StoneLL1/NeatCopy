<h2>选择方式？</h2>
<p class="subtitle">用户如何在轮盘中选择 Prompt？</p>

<div class="options">
  <div class="option" data-choice="mouse" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>纯鼠标点击</h3>
      <p>移动鼠标到目标选项，点击确认选择</p>
    </div>
  </div>
  <div class="option" data-choice="keyboard" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>键盘数字键</h3>
      <p>弹出后按 1-9 数字键直接选择对应位置</p>
    </div>
  </div>
  <div class="option" data-choice="both" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>两者都支持</h3>
      <p>鼠标点击 + 数字键，用户可按习惯选择</p>
    </div>
  </div>
</div>
