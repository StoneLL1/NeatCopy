<h2>已确认：ESC + 点击外部关闭</h2>
<p class="subtitle">两种方式均可关闭轮盘</p>

<h2>设置界面中如何管理此功能？</h2>
<p class="subtitle">用户需要在设置中配置哪些选项？</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="enable-toggle" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>启用/禁用开关</h3>
      <p>是否启用轮盘功能（整体开关）</p>
    </div>
  </div>
  <div class="option" data-choice="hotkey-config" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>独立切换热键配置</h3>
      <p>自定义"锁定模式"的快捷键（默认 Ctrl+Shift+P）</p>
    </div>
  </div>
  <div class="option" data-choice="trigger-with-clean" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>随清洗触发开关</h3>
      <p>是否在按 Ctrl+C+C 时也弹出轮盘（可单独关闭）</p>
    </div>
  </div>
  <div class="option" data-choice="visual-style" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>轮盘样式选择</h3>
      <p>在扇形/列表/网格之间切换（可选，默认扇形）</p>
    </div>
  </div>
</div>

<p style="color:#888;margin-top:1rem;font-size:0.85rem">可多选，选择所有你认为需要暴露给用户的配置项</p>
